name: AI Triage Eval

on:
  pull_request:
    paths:
      - "agent/**"   # only run when agent code changes — saves API costs

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # 15 LLM calls should finish well under this

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: pip install -r agent/requirements.txt pytest pytest-asyncio

      - name: Run triage eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest agent/tests/test_triage_eval.py \
            -v \
            --tb=short \
            --asyncio-mode=auto \
            -p no:warnings
